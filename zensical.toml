[project]
site_name = "FactionsUUID"
site_description = "Premium Factions for premium people."
site_author = "MOSS"
site_url = "https://factions.support/"

repo_name = "Support Discord"
repo_url = "https://discord.gg/PHpuzZS"

copyright = "Copyright &copy; 2019-2026"

extra_css = [
  "stylesheets/dark_theme.css",
  "stylesheets/codehilite.css",
]

nav = [
  { "Home" = "index.md" },
  { "Support" = "help.md" },
  { "Project News" = [
    { "Overview" = "news/index.md" },
    { "FactionsUUID 4.6.0" = "news/4.6.0.md" },
    { "FactionsUUID 4.5.0" = "news/4.5.0.md" },
    { "FactionsUUID 4.4.0" = "news/4.4.0.md" },
    { "FactionsUUID 4.3.0" = "news/4.3.0.md" },
  ] },
  { "The Big 4.0 Update" = "four.md" },
  { "Introduction" = "introduction.md" },
  { "Definitions" = "definitions.md" },
  { "First Steps" = "firststeps.md" },
  { "Chat Formatting" = "chat.md" },
  { "Commands" = "commands.md" },
  { "Permissions" = "permissions.md" },
  { "Permission Nodes" = "permissionnodes.md" },
  { "Permission Contexts" = "contexts.md" },
  { "Placeholders" = "placeholders.md" },
  { "PlaceholderAPI" = "placeholderapi.md" },
  { "Particles" = "particles.md" },
  { "Upgrades" = "upgrades.md" },
  { "Developers" = "developers.md" },
]

[project.theme]
variant = "classic"
custom_dir = "overrides"
language = "en"
features = [
  "navigation.instant",
  "navigation.instant.prefetch",
]

[project.theme.icon]
repo = "fontawesome/brands/discord"

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[[project.theme.palette]]
scheme = "slate"
primary = "green"
accent = "light green"

[project.extra]
fuuidversion = "4.5.0"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.gg/PHpuzZS"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.codehilite]
guess_lang = false
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.critic]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.toc]
permalink = true

[project.plugins.search]
